{% extends "portal/base_portal.html" %}

{% block title %}{% block ck_title %}{% endblock %}{% endblock %}

{% block content %}
<div class="ck-page">
    <!-- 1. Toolbar: слева кнопки (над таблицей), справа мета записи (над панелью
         формы, в одной полосе-отчерке вровень с тулбаром — см. п.7) -->
    <div class="ck-toolbar">
        <div class="ck-toolbar__left">
            <button class="btn btn-primary" id="ckAddRecordBtn">+ Добавить запись</button>
            <button class="btn btn-secondary" id="ckResetFiltersBtn">Сброс фильтров</button>
            <button class="btn btn-secondary" id="ckColvisBtn" title="Настройка колонок">Колонки</button>
        </div>
        <div class="ck-toolbar__right">
            <span class="ck-record-title" id="ckRecordTitle"></span>
            <span class="ck-record-meta" id="ckRecordMeta"></span>
        </div>
    </div>

    <!-- 2. Content -->
    <div class="ck-content">
        <div class="ck-content__table-panel" id="ckTablePanel"></div>
        <div class="ck-content__form-panel">
            <div class="ck-form-mount" id="ckFormPanel"></div>
        </div>
    </div>

    <!-- 4. Footer -->
    <div class="ck-footer">
        <div class="ck-footer__left" id="ckPaginationContainer"></div>
        <div class="ck-footer__right">
            <button class="btn btn-primary" id="ckSaveBtn" style="padding:5px 20px; font-size:12px;">Сохранить</button>
            <button class="btn btn-secondary" id="ckDeleteBtn" style="padding:5px 14px; font-size:12px; color:var(--error); border-color:var(--error);">Удалить</button>
        </div>
    </div>
</div>
{% endblock %}

{% block init_script %}
<script type="module" nonce="{{ request.state.csp_nonce }}">
    import { AuthManager } from '{{ url_for('static', path='js/shared/auth.js') | versioned }}';
    import { PortalSidebar } from '{{ url_for('static', path='js/portal/portal-sidebar.js') | versioned }}';
    import { LandingSettingsManager } from '{{ url_for('static', path='js/portal/portal-settings.js') | versioned }}';
    // ck-страницы (fin-res, client-exp) подключают свои page-модули, которые
    // в свою очередь импортят shared/ck/* (CkForm, CkProcessPicker) и таблицу/
    // пагинацию берут из generic-тулкита shared/datatable/*.
    {% block ck_init_imports %}{% endblock %}

    document.addEventListener('DOMContentLoaded', async () => {
        const isAuthorized = await AuthManager.requireAuth();
        if (isAuthorized) {
            PortalSidebar.init();
            LandingSettingsManager.init();

            {% block ck_init %}{% endblock %}
        }
    });
</script>
{% endblock %}
