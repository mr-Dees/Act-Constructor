<!-- Кнопка предпросмотра -->
<div class="preview-menu-container">
    <div class="header-action-container">
        <button id="previewMenuBtn" class="header-action-btn" title="Предпросмотр документа"
                aria-label="Открыть предпросмотр">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none">
                <path d="M1 12C1 12 5 4 12 4C19 4 23 12 23 12C23 12 19 20 12 20C5 20 1 12 1 12Z"
                      stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                <circle cx="12" cy="12" r="3" stroke="currentColor" stroke-width="2"/>
            </svg>
        </button>
        <span class="header-action-label">Просмотр</span>
    </div>

    <!-- Выпадающая панель предпросмотра -->
    <div id="previewMenu" class="preview-menu hidden">
        <!-- Ручка для изменения размера -->
        <div class="preview-menu-resize-handle" id="previewMenuResizeHandle">
            <div class="preview-menu-resize-indicator">
                <div class="resize-grip"></div>
                <div class="resize-grip"></div>
                <div class="resize-grip"></div>
            </div>
        </div>

        <div class="preview-menu-header">
            <h4><span aria-hidden="true">👁️</span> Предварительный просмотр</h4>
            <button id="closePreviewMenuBtn" class="preview-menu-close" aria-label="Закрыть">&times;</button>
        </div>
        <div class="preview-menu-body" id="previewMenuBody">
            <!-- Содержимое загружается динамически -->
        </div>
    </div>
</div>
