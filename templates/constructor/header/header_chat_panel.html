<!-- Кнопка и popup-панель AI-ассистента -->
<div class="chat-popup-container">
    <div class="header-action-container">
        <button id="chatPopupBtn" class="header-action-btn" title="AI Ассистент"
                aria-label="Открыть чат с AI-ассистентом">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none">
                <path d="M8 12h.01M12 12h.01M16 12h.01M21 12c0 4.418-4.03 8-9 8a9.863 9.863 0 01-4.255-.949L3 20l1.395-3.72C3.512 15.042 3 13.574 3 12c0-4.418 4.03-8 9-8s9 3.582 9 8z"
                      stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
        </button>
        <span class="header-action-label">Ассистент</span>
    </div>

    <!-- Popup-панель чата -->
    <div id="chatPopupPanel" class="chat-popup-panel hidden">
        <!-- Содержимое чата (shared) -->
        <div class="chat-panel">
            {% include 'shared/chat_content.html' %}
        </div>

        <!-- Угловая ручка для свободного изменения размера (bottom-right) -->
        <div class="chat-popup-resize-corner" id="chatPopupResizeCorner"></div>
    </div>
</div>
